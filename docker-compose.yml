services:
  # ====================================================================================
  # PHASE 4: DAGSTER + WEB API SERVICES
  # ====================================================================================

  # Dagster PostgreSQL database
  dagster-postgres:
    image: postgres:15
    container_name: dagster-postgres
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster-postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-climate-app.sh:ro
    networks:
      - climate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 512m
    memswap_limit: 512m

  # Dagster Daemon (for schedules and sensors)
  dagster-daemon:
    build: .
    container_name: dagster-daemon
    command: dagster-daemon run -w dagster_project/workspace.yaml
    volumes:
      - ./dagster_project:/app/dagster_project
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./rag-mendelu:/app/rag-mendelu
      - ./.env:/app/.env:ro
      - ./docker/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - dagster-home:/opt/dagster/dagster_home
      - model-cache:/root/.cache
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_REST_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - VECTOR_DB_MEMORY_ONLY=false
      - APP_DATABASE_URL=postgresql://dagster:dagster@dagster-postgres:5432/climate_app
    depends_on:
      dagster-postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - climate-net
    restart: unless-stopped
    # Daemon polls schedules + sensors. Light when idle; spikes when a
    # scheduled job runs and pulls torch lazily. 1.5g covers both.
    mem_limit: 1500m
    memswap_limit: 1500m
    # GPU access for the same reason as web-api — Dagster ops invoke the
    # raster pipeline + embedder, both benefit massively from cuda.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  qdrant:
    image: qdrant/qdrant:v1.17.1
    container_name: climate-qdrant
    # Bound to localhost only — inter-container traffic goes via the climate-net
    # bridge (hostname `qdrant`), so nothing needs the public interface.
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - climate-net
    restart: unless-stopped
    # 1.5M points + scalar quantization needs headroom; 5g leaves room for
    # the others while letting Qdrant cache hot segments in memory.
    mem_limit: 5g
    memswap_limit: 5g

  # Dagster webserver (formerly dagit)
  dagit:
    build: .
    container_name: dagit
    command: dagster-webserver -h 0.0.0.0 -p 3000 -w dagster_project/workspace.yaml
    # Bound to localhost only — in prod Caddy reverse-proxies to it via the
    # climate-net bridge. Publishing 3000 to the host was leaking an
    # unauthenticated Dagit UI on the droplet.
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./dagster_project:/app/dagster_project
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./rag-mendelu:/app/rag-mendelu
      - ./.env:/app/.env:ro
      - ./docker/dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
      - dagster-home:/opt/dagster/dagster_home
      - model-cache:/root/.cache
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_REST_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - APP_DATABASE_URL=postgresql://dagster:dagster@dagster-postgres:5432/climate_app
    depends_on:
      dagster-postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - climate-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:3000', timeout=3).status == 200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s
    # Dagit webserver itself is light, but workspace.yaml loads the full
    # repository module on import (catalog + climate_embeddings → torch).
    mem_limit: 1500m
    memswap_limit: 1500m

  # FastAPI Web Service
  web-api:
    build: .
    container_name: climate-web-api
    # --reload is convenient during thesis work; for production set
    # UVICORN_RELOAD=0 in the environment to disable it.
    command: >
      sh -c "if [ \"${UVICORN_RELOAD:-1}\" = \"0\" ]; then
               uvicorn web_api.main:app --host 0.0.0.0 --port 8000 --workers 1;
             else
               uvicorn web_api.main:app --host 0.0.0.0 --port 8000 --reload --reload-dir /app/web_api --reload-dir /app/src;
             fi"
    ports:
      - "8000:8000"
    volumes:
      - ./dagster_project:/app/dagster_project
      - ./src:/app/src
      - ./tests:/app/tests
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./web_api:/app/web_api
      - ./rag-mendelu:/app/rag-mendelu
      - model-cache:/root/.cache
    env_file:
      - .env
    environment:
      - DAGSTER_HOST=dagit
      - DAGSTER_PORT=3000
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      # HuggingFace tokenizers can deadlock when a forked subprocess
      # inherits a primed (CUDA-aware) tokenizer state. Disabling
      # parallelism is the official workaround.
      - TOKENIZERS_PARALLELISM=false
      # Cap OpenMP threads so libraries (numpy/torch) don't saturate
      # all cores and starve the upsert/dask threads.
      - OMP_NUM_THREADS=4
      - QDRANT_HOST=qdrant
      - QDRANT_REST_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - VECTOR_DB_MEMORY_ONLY=false
      - APP_DATABASE_URL=postgresql://dagster:dagster@dagster-postgres:5432/climate_app
      - CDS_API_URL=${CDS_API_URL:-https://cds.climate.copernicus.eu/api}
      - CDS_API_KEY=${CDS_API_KEY:-}
      - NASA_EARTHDATA_TOKEN=${NASA_EARTHDATA_TOKEN:-}
      - NASA_EARTHDATA_USER=${NASA_EARTHDATA_USER:-}
      - NASA_EARTHDATA_PASSWORD=${NASA_EARTHDATA_PASSWORD:-}
      - CMEMS_USERNAME=${CMEMS_USERNAME:-}
      - CMEMS_PASSWORD=${CMEMS_PASSWORD:-}
      - EIDC_USERNAME=${EIDC_USERNAME:-}
      - EIDC_PASSWORD=${EIDC_PASSWORD:-}
      - NCAR_RDA_TOKEN=${NCAR_RDA_TOKEN:-}
      - CEDA_TOKEN=${CEDA_TOKEN:-}
    depends_on:
      dagit:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - climate-net
    restart: unless-stopped
    # FastAPI + sentence-transformers (BAAI/bge-large-en-v1.5 ~1.3 GB on
    # first load) + reranker model + per-request torch tensors + xarray
    # eager loads of multi-GB NetCDFs (E-OBS tn alone is 2 GB). The
    # original 3g limit OOM-killed subprocesses silently during catalog
    # batch — bumped to 6g which gives clear headroom for the largest
    # single dataset variable + model + ETL working set.
    mem_limit: 6g
    memswap_limit: 6g
    # GPU passthrough — embedding moves from CPU (~30-90s per 1k chunks)
    # to GPU (~3-8s). Requires NVIDIA driver on the Windows host that
    # supports WSL2 GPU passthrough (470+) and `nvidia-container-toolkit`
    # (Docker Desktop bundles this). If the host doesn't expose the GPU,
    # PyTorch falls back to CPU automatically — won't crash.
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # Caddy reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: climate-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - climate-net
    depends_on:
      - web-api
    restart: unless-stopped
    mem_limit: 256m
    memswap_limit: 256m

  # Optional: Jupyter notebook for interactive analysis
  # Start manually with: docker compose --profile jupyter up jupyter
  jupyter:
    # Pinned to a reproducible tag so presentation/demo doesn't surprise us.
    image: jupyter/scipy-notebook:2024-04-15
    container_name: climate-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./data:/home/jovyan/work/data
      - ./src:/home/jovyan/work/src
      - ./docs:/home/jovyan/work/docs
    environment:
      - JUPYTER_ENABLE_LAB=yes
    networks:
      - climate-net
    profiles:
      - jupyter

volumes:
  dagster-postgres-data:
    driver: local
  dagster-home:
    driver: local
  qdrant-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local
  model-cache:
    driver: local

networks:
  climate-net:
    driver: bridge
