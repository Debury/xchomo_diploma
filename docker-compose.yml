services:
  # ====================================================================================
  # PHASE 4: DAGSTER + WEB API SERVICES
  # ====================================================================================

  # Dagster PostgreSQL database
  dagster-postgres:
    image: postgres:15
    container_name: dagster-postgres
    environment:
      POSTGRES_USER: dagster
      POSTGRES_PASSWORD: dagster
      POSTGRES_DB: dagster
    volumes:
      - dagster-postgres-data:/var/lib/postgresql/data
      - ./docker/init-db.sh:/docker-entrypoint-initdb.d/init-climate-app.sh:ro
    networks:
      - climate-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dagster"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dagster Daemon (for schedules and sensors)
  dagster-daemon:
    build: .
    container_name: dagster-daemon
    command: dagster-daemon run -w dagster_project/workspace.yaml
    volumes:
      - ./dagster_project:/app/dagster_project
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - dagster-home:/opt/dagster/dagster_home
    env_file:
      - .env
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=dagster
      - DAGSTER_POSTGRES_PASSWORD=dagster
      - DAGSTER_POSTGRES_DB=dagster
      - DAGSTER_POSTGRES_HOST=dagster-postgres
      - DAGSTER_POSTGRES_PORT=5432
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_REST_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - VECTOR_DB_MEMORY_ONLY=false
      - APP_DATABASE_URL=postgresql://dagster:dagster@dagster-postgres:5432/climate_app
    depends_on:
      dagster-postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - climate-net
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: climate-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - climate-net
    restart: unless-stopped

  # Dagit Web UI
  dagit:
    build: .
    container_name: dagit
    command: dagit -h 0.0.0.0 -p 3000 -w dagster_project/workspace.yaml
    ports:
      - "3000:3000"
    volumes:
      - ./dagster_project:/app/dagster_project
      - ./src:/app/src
      - ./config:/app/config
      - ./data:/app/data
      - ./logs:/app/logs
      - ./.env:/app/.env:ro
      - dagster-home:/opt/dagster/dagster_home
    environment:
      - DAGSTER_HOME=/opt/dagster/dagster_home
      - DAGSTER_POSTGRES_USER=dagster
      - DAGSTER_POSTGRES_PASSWORD=dagster
      - DAGSTER_POSTGRES_DB=dagster
      - DAGSTER_POSTGRES_HOST=dagster-postgres
      - DAGSTER_POSTGRES_PORT=5432
      - PYTHONPATH=/app
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_REST_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - APP_DATABASE_URL=postgresql://dagster:dagster@dagster-postgres:5432/climate_app
    depends_on:
      dagster-postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    networks:
      - climate-net
    restart: unless-stopped

  # FastAPI Web Service
  web-api:
    build: .
    container_name: climate-web-api
    command: uvicorn web_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./dagster_project:/app/dagster_project
      - ./src:/app/src
      - ./tests:/app/tests
      - ./.env:/app/.env:ro
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
      - ./web_api:/app/web_api
    env_file:
      - .env
    environment:
      - DAGSTER_HOST=dagit
      - DAGSTER_PORT=3000
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
      - QDRANT_HOST=qdrant
      - QDRANT_REST_PORT=6333
      - QDRANT_GRPC_PORT=6334
      - VECTOR_DB_MEMORY_ONLY=false
      - APP_DATABASE_URL=postgresql://dagster:dagster@dagster-postgres:5432/climate_app
      - CDS_API_URL=${CDS_API_URL:-https://cds.climate.copernicus.eu/api}
      - CDS_API_KEY=${CDS_API_KEY:-}
      - NASA_EARTHDATA_TOKEN=${NASA_EARTHDATA_TOKEN:-}
      - NASA_EARTHDATA_USER=${NASA_EARTHDATA_USER:-}
      - NASA_EARTHDATA_PASSWORD=${NASA_EARTHDATA_PASSWORD:-}
      - CMEMS_USERNAME=${CMEMS_USERNAME:-}
      - CMEMS_PASSWORD=${CMEMS_PASSWORD:-}
      - EIDC_USERNAME=${EIDC_USERNAME:-}
      - EIDC_PASSWORD=${EIDC_PASSWORD:-}
      - NCAR_RDA_TOKEN=${NCAR_RDA_TOKEN:-}
      - CEDA_TOKEN=${CEDA_TOKEN:-}
    depends_on:
      dagit:
        condition: service_started
      qdrant:
        condition: service_started
    networks:
      - climate-net
    restart: unless-stopped

  # Caddy reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: climate-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    networks:
      - climate-net
    depends_on:
      - web-api
    restart: unless-stopped

  # Optional: Jupyter notebook for interactive analysis
  # Start manually with: docker compose --profile jupyter up jupyter
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: climate-jupyter
    ports:
      - "8888:8888"
    volumes:
      - ./data:/home/jovyan/work/data
      - ./src:/home/jovyan/work/src
      - ./docs:/home/jovyan/work/docs
    environment:
      - JUPYTER_ENABLE_LAB=yes
    networks:
      - climate-net
    profiles:
      - jupyter

volumes:
  dagster-postgres-data:
    driver: local
  dagster-home:
    driver: local
  qdrant-data:
    driver: local
  caddy-data:
    driver: local
  caddy-config:
    driver: local

networks:
  climate-net:
    driver: bridge
