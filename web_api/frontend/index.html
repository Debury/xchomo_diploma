<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ClimateRAG</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* Skeleton that shows before Vue mounts — keeps the page from flashing
       blank white while the JS bundle (~111 KB gzipped) downloads. */
    #app-boot {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      color: #535a5d;
      background: #ffffff;
      gap: 0.75rem;
      font-size: 0.875rem;
    }
    .dark #app-boot { background: #0f172a; color: #94a3b8; }
    #app-boot .dot {
      width: 8px; height: 8px; border-radius: 999px; background: #79be15;
      animation: boot-bounce 1.4s infinite ease-in-out both;
    }
    #app-boot .dot:nth-child(1) { animation-delay: -0.32s; }
    #app-boot .dot:nth-child(2) { animation-delay: -0.16s; }
    @keyframes boot-bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }
    /* Hide the skeleton the moment Vue mounts (it replaces #app's innerHTML). */
    #app:not(:empty) ~ #app-boot { display: none; }
  </style>
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark')
  </script>
</head>
<body>
  <div id="app"></div>
  <div id="app-boot" aria-hidden="true">
    <span class="dot"></span>
    <span class="dot"></span>
    <span class="dot"></span>
    <span>Loading ClimateRAG…</span>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
